appId: com.polyml.app
productName: PolyML
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.pytest_cache/**"
      - "!**/test_*.py"
      - "!**/tests/**"
win:
  target: nsis
  icon: resources/icon.ico
mac:
  target: dmg
  icon: resources/icon.icns
linux:
  target: AppImage
  icon: resources/icon.png
