name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: polyml
          environment-file: backend/environment.yml
          auto-activate-base: false
          use-mamba: true
      - name: Backend tests
        shell: pwsh
        run: conda run -n polyml python -m pytest backend

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  windows-package:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run package
      - name: Installer smoke test
        shell: pwsh
        run: |
          .\scripts\smoke-installer.ps1 `
            -InstallerPath '.\release\PolyML Setup 0.1.1.exe' `
            -InstallDir (Join-Path $env:RUNNER_TEMP 'PolyML-smoke')
      - uses: actions/upload-artifact@v4
        with:
          name: polyml-windows-installer
          path: frontend/release/*.exe
